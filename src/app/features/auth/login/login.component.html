<main class="login-page">
  <section class="login-card">
    <div class="brand">
      <div class="brand-mark">VG</div>

      <div>
        <h1>VoltGuard</h1>
        <p>Electrical asset testing and reporting</p>
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="hint">Use your VoltGuard account to continue.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="admin@voltguard.local"
        />
      </label>

      <div class="field-error" *ngIf="email.invalid && (email.dirty || email.touched)">
        Enter a valid email address.
      </div>

      <label>
        Password
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Enter password"
        />
      </label>

      <div class="field-error" *ngIf="password.invalid && (password.dirty || password.touched)">
        Password is required.
      </div>

      <div class="api-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>
